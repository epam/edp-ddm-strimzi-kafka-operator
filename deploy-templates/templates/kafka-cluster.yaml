apiVersion: kafka.strimzi.io/v1beta1
kind: Kafka
metadata:
  name: {{ .Values.cluster.name }}
spec:
  kafka:
    version: 2.6.0
    replicas: 3
    resources:
      requests:
        memory: 1Gi
        cpu: "0.1"
      limits:
        memory: 1Gi
        cpu: "0.5"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.compression.codec: 1
      offsets.topic.retention.minutes: 1
      offsets.topic.segment.bytes: 5000
      log.cleaner.enable: 'true'
      log.retention.minutes: 1
      log.segment.bytes: 5000
      log.cleaner.threads: 2
      transaction.state.log.replication.factor: 3
      log.retention.check.interval.ms: 60000
      log.retention.bytes: 5000
      log.message.format.version: '2.6'
      transaction.state.log.min.isr: 2
      log.cleaner.delete.retention.ms: 60000
      log.roll.minutes: 2
      offsets.topic.replication.factor: 3
    storage:
      type: jbod
      volumes:
      - id: 0
        type: persistent-claim
        size: 5Gi
        deleteClaim: false
    metrics: {}
  kafkaExporter:
    groupRegex: ".*"
    topicRegex: ".*"
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 1Gi
      deleteClaim: false
  entityOperator:
    topicOperator: {}
    userOperator: {}