apiVersion: kafka.strimzi.io/v1alpha1
kind: KafkaConnector
metadata:
  labels:
    strimzi.io/cluster: 'kafka-connect-cluster'
  name: 'audit'
spec:
  class: 'io.confluent.connect.jdbc.JdbcSinkConnector'
  tasksMax: 1
  config:
    value.converter.schema.registry.url: 'http://kafka-schema-registry:8081'
    value.converter: 'io.confluent.connect.avro.AvroConverter'
    topics: 'audit-events'
    name: 'audit'
    connection.password: '${file:/opt/kafka/external-configuration/connector-config/connector.properties:dbPassword}'
    connector.class: 'io.confluent.connect.jdbc.JdbcSinkConnector'
    table.name.format: 'audit_event'
    connection.user: '${file:/opt/kafka/external-configuration/connector-config/connector.properties:dbUsername}'
    auto.evolve: 'true'
    connection.url: 'jdbc:postgresql://citus-master:5432/${file:/opt/kafka/external-configuration/connector-config/connector.properties:dbName}'
    transforms: 'TimestampConverter'
    transforms.TimestampConverter.field: 'timestamp'
    transforms.TimestampConverter.type: 'org.apache.kafka.connect.transforms.TimestampConverter$Value'
    transforms.TimestampConverter.target.type: 'Timestamp'

